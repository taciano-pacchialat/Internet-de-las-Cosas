<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel IoT - Temperatura y Humedad</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
            max-width: 500px;
            width: 100%;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 5px;
        }
        
        .header .status {
            font-size: 14px;
            color: #666;
        }
        
        .status.connected {
            color: #4CAF50;
        }
        
        .metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .metric-card {
            background: #f5f5f5;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
        
        .metric-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        
        .metric-value {
            font-size: 32px;
            font-weight: bold;
            color: #333;
        }
        
        .metric-unit {
            font-size: 16px;
            color: #999;
            margin-left: 5px;
        }
        
        .metric-time {
            font-size: 11px;
            color: #ccc;
            margin-top: 8px;
        }
        
        .controls {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .btn {
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-led {
            background: #ff9800;
            color: white;
        }
        
        .btn-led:hover {
            background: #fb8c00;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,152,0,0.3);
        }
        
        .btn-led.active {
            background: #4CAF50;
        }
        
        .btn-led.active:hover {
            background: #45a049;
        }
        
        .history-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        
        .history-title {
            font-size: 14px;
            color: #666;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }
        
        .history-chart {
            background: #f5f5f5;
            border-radius: 10px;
            padding: 15px;
            height: 200px;
            display: flex;
            align-items: flex-end;
            gap: 3px;
            overflow-x: auto;
        }
        
        .history-bar {
            flex: 1;
            min-width: 4px;
            background: linear-gradient(to top, #667eea, #764ba2);
            border-radius: 2px;
            opacity: 0.7;
            transition: all 0.2s;
        }
        
        .history-bar:hover {
            opacity: 1;
        }
        
        .history-list {
            margin-top: 15px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 12px;
        }
        
        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            border-bottom: 1px solid #eee;
            color: #666;
        }
        
        .history-item:last-child {
            border-bottom: none;
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 20px;
                border-radius: 15px;
            }
            
            .header h1 {
                font-size: 24px;
            }
            
            .metric-value {
                font-size: 24px;
            }
            
            .history-chart {
                height: 150px;
            }
        }
        
        @media (max-width: 360px) {
            .metrics {
                gap: 10px;
            }
            
            .metric-card {
                padding: 15px;
            }
            
            .metric-value {
                font-size: 20px;
            }
            
            .btn {
                padding: 12px;
                font-size: 14px;
            }
        }
        
        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌡️ IoT Dashboard</h1>
            <div class="status" id="status">
                <span class="spinner"></span> Conectando...
            </div>
        </div>
        
        <div class="metrics">
            <div class="metric-card">
                <div class="metric-label">Temperatura</div>
                <div>
                    <span class="metric-value" id="temp">--</span>
                    <span class="metric-unit">°C</span>
                </div>
                <div class="metric-time" id="tempTime">-</div>
            </div>
            
            <div class="metric-card">
                <div class="metric-label">Humedad</div>
                <div>
                    <span class="metric-value" id="humidity">--</span>
                    <span class="metric-unit">%</span>
                </div>
                <div class="metric-time" id="humidityTime">-</div>
            </div>
        </div>
        
        <div class="controls">
            <button class="btn btn-led" id="ledBtn" onclick="toggleLED()">
                💡 LED: OFF
            </button>
        </div>
        
        <div class="history-section">
            <div class="history-title">Histórico (últimas 30 muestras)</div>
            <div class="history-chart" id="chart"></div>
            <div class="history-list" id="historyList"></div>
        </div>
    </div>
    
    <script>
        let ws = null;
        let ledState = false;
        let maxTemp = 50;
        let maxHumidity = 100;
        
        const STATUS_ELEMENT = document.getElementById('status');
        const TEMP_ELEMENT = document.getElementById('temp');
        const HUMIDITY_ELEMENT = document.getElementById('humidity');
        const TEMP_TIME_ELEMENT = document.getElementById('tempTime');
        const HUMIDITY_TIME_ELEMENT = document.getElementById('humidityTime');
        const LED_BTN = document.getElementById('ledBtn');
        const CHART = document.getElementById('chart');
        const HISTORY_LIST = document.getElementById('historyList');
        
        let history = [];
        let pollInterval = null;
        
        function connect() {
            try {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                ws = new WebSocket(`${protocol}//${window.location.host}/ws`);
                
                ws.onopen = () => {
                    STATUS_ELEMENT.textContent = '✓ Conectado';
                    STATUS_ELEMENT.classList.add('connected');
                    clearInterval(pollInterval);
                };
                
                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        updateMetrics(data);
                    } catch (e) {
                        console.error('Error parsing WebSocket message:', e);
                    }
                };
                
                ws.onerror = (error) => {
                    console.error('WebSocket error:', error);
                };
                
                ws.onclose = () => {
                    STATUS_ELEMENT.textContent = '✗ Desconectado (reintentando cada 5s)';
                    STATUS_ELEMENT.classList.remove('connected');
                    clearInterval(pollInterval);
                    setTimeout(connect, 5000);
                };
            } catch (error) {
                console.error('Connection error:', error);
                setTimeout(connect, 5000);
            }
        }
        
        function updateMetrics(data) {
            if (data.temperature !== undefined) {
                TEMP_ELEMENT.textContent = data.temperature.toFixed(1);
            }
            
            if (data.humidity !== undefined) {
                HUMIDITY_ELEMENT.textContent = data.humidity.toFixed(1);
            }
            
            if (data.timestamp) {
                const date = new Date(data.timestamp * 1000);
                const timeStr = date.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
                TEMP_TIME_ELEMENT.textContent = `Actualizado: ${timeStr}`;
                HUMIDITY_TIME_ELEMENT.textContent = `Actualizado: ${timeStr}`;
            }
            
            if (data.history && Array.isArray(data.history)) {
                history = data.history;
                updateChart();
            }
        }
        
        function updateChart() {
            CHART.innerHTML = '';
            HISTORY_LIST.innerHTML = '';
            
            if (history.length === 0) return;
            
            // Calcular máximos para escala
            const temps = history.map(h => h.temperature || 0);
            const humids = history.map(h => h.humidity || 0);
            const maxT = Math.max(...temps, 50);
            const maxH = 100;
            
            // Mostrar barras de temperatura
            history.forEach((item, idx) => {
                const bar = document.createElement('div');
                bar.className = 'history-bar';
                bar.style.height = `${(item.temperature / maxT) * 100}%`;
                bar.title = `T: ${item.temperature.toFixed(1)}°C, H: ${item.humidity.toFixed(1)}%`;
                CHART.appendChild(bar);
            });
            
            // Lista de últimas 10 muestras (sin timestamps)
            const recentHistory = history.slice(-10).reverse();
            recentHistory.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'history-item';
                const sampleNum = history.length - idx;
                div.innerHTML = `
                    <span>#${sampleNum}</span>
                    <span>${item.temperature.toFixed(1)}°C / ${item.humidity.toFixed(1)}%</span>
                `;
                HISTORY_LIST.appendChild(div);
            });
        }
        
        function toggleLED() {
            fetch('/api/led', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ state: !ledState })
            })
            .then(r => r.json())
            .then(data => {
                ledState = data.state;
                LED_BTN.textContent = ledState ? '💡 LED: ON' : '💡 LED: OFF';
                LED_BTN.classList.toggle('active', ledState);
            })
            .catch(e => console.error('LED error:', e));
        }
        
        function fetchMetrics() {
            fetch('/api/metrics')
                .then(r => r.json())
                .then(data => {
                    updateMetrics(data);
                    if (!ws || ws.readyState !== WebSocket.OPEN) {
                        STATUS_ELEMENT.textContent = '⚡ Polling (WebSocket no disponible)';
                        STATUS_ELEMENT.classList.add('connected');
                    }
                })
                .catch(e => {
                    console.error('Fetch error:', e);
                    STATUS_ELEMENT.textContent = '✗ Error';
                    STATUS_ELEMENT.classList.remove('connected');
                });
        }
        
        // Iniciar conexión WebSocket
        connect();
        
        // Fallback a polling cada 5 segundos si WebSocket no está disponible
        setTimeout(() => {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                console.log('WebSocket no disponible, usando polling');
                fetchMetrics();
                pollInterval = setInterval(fetchMetrics, 5000);
            }
        }, 2000);
        
        // Solicitar métricas al cargar (mientras se conecta WebSocket)
        fetchMetrics();
    </script>
</body>
</html>
