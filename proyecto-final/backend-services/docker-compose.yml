services:

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: geofence-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    restart: unless-stopped

  influxdb:
    image: influxdb:1.8
    container_name: geofence-influxdb
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=geofence_db
      - INFLUXDB_ADMIN_USER=admin
      - INFLUXDB_ADMIN_PASSWORD=admin123
      - INFLUXDB_HTTP_AUTH_ENABLED=false
    volumes:
      - ./influxdb/data:/var/lib/influxdb
    restart: unless-stopped

  nodered:
    image: nodered/node-red:latest
    container_name: geofence-nodered
    ports:
      - "1880:1880"
    volumes:
      - ./nodered/data:/data
    environment:
      - TZ=America/Argentina/Buenos_Aires
      - NODE_OPTIONS=--dns-result-order=ipv4first
    depends_on:
      - mosquitto
      - influxdb
    restart: unless-stopped

  frontend-app:
    build:
      context: ./frontend-app
      dockerfile: Dockerfile
    container_name: geofence-frontend
    ports:
      - "80:80"
    depends_on:
      - influxdb
    restart: unless-stopped

  discovery:
    build:
      context: ./discovery
      dockerfile: Dockerfile
    container_name: geofence-discovery
    network_mode: host
    environment:
      - DISCOVERY_BEACON_PORT=19883
      - MQTT_BROKER_PORT=1883
      - DISCOVERY_INTERVAL_SEC=3.0
    restart: unless-stopped
